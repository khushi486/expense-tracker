{% extends "base.html" %}
{% block title %}Login · Expense Tracker{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-3xl font-semibold mb-2 text-center">Login</h1>
  <p class="text-slate-400 mb-8 text-center">Sign in to access your expense tracker.</p>

  <section class="rounded-2xl border border-slate-800 bg-slate-900 p-8">
    <form method="post" action="{{ url_for('login') }}" class="space-y-4">
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-300">Username</span>
        <input name="username" required
               class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent" />
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-300">Password</span>
        <input type="password" name="password" required
               class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent" />
      </label>
      <button type="submit"
              class="w-full rounded-xl bg-brand hover:bg-brand-500 text-white font-medium py-3 px-4 border-0 focus:outline-none focus:ring-2 focus:ring-brand focus:ring-offset-2 focus:ring-offset-slate-900">
        Sign In
      </button>
    </form>
    <p class="mt-6 text-center text-sm text-slate-400">
      No account? <a href="{{ url_for('register') }}" class="text-brand hover:text-brand-100 font-medium">Register here</a>
    </p>
  </section>
</div>
{% endblock %}
